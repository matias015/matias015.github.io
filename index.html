<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOL — Ingresar</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono&display=swap');
:root {
  --bg:#0b0d12; --surf:#111318; --card:#161b24;
  --b1:rgba(255,255,255,0.07); --b2:rgba(255,255,255,0.14);
  --txt:#dde1ea; --muted:#636878;
  --acc:#4f8ef7; --red:#f43f5e;
  --font:'IBM Plex Sans',sans-serif;
  --r:10px;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--font); background:var(--bg); color:var(--txt); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
.wrap { width:100%; max-width:380px; }
.logo-row { display:flex; align-items:center; gap:10px; margin-bottom:32px; justify-content:center; }
.logo { width:36px; height:36px; background:var(--acc); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:600; color:#fff; }
.brand { font-size:16px; font-weight:500; }
.card { background:var(--card); border:1px solid var(--b1); border-radius:14px; padding:32px; }
.card-title { font-size:20px; font-weight:300; margin-bottom:6px; }
.card-sub { font-size:13px; color:var(--muted); margin-bottom:28px; line-height:1.6; }
.field { margin-bottom:18px; }
.field label { display:block; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:7px; }
.field input { width:100%; background:var(--surf); border:1px solid var(--b2); border-radius:var(--r); padding:11px 14px; color:var(--txt); font-family:var(--font); font-size:14px; outline:none; transition:border-color .2s; }
.field input:focus { border-color:var(--acc); }
.field input.err { border-color:var(--red); }
.btn { width:100%; background:var(--acc); border:none; border-radius:var(--r); padding:13px; color:#fff; font-family:var(--font); font-size:14px; font-weight:500; cursor:pointer; transition:opacity .2s; margin-top:8px; }
.btn:hover { opacity:.88; }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.msg { padding:12px 16px; border-radius:var(--r); font-size:13px; margin-bottom:18px; display:none; }
.msg.error { background:rgba(244,63,94,.1); border:1px solid rgba(244,63,94,.25); color:#fb7185; }
.footer-note { text-align:center; font-size:12px; color:var(--muted); margin-top:20px; line-height:1.7; }
.spinner { display:inline-block; width:13px; height:13px; border:2px solid rgba(255,255,255,.2); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; margin-right:6px; }
@keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <div class="logo">T</div>
    <span class="brand">TOL Slots Dashboard</span>
  </div>

  <div class="card">
    <div class="card-title">Ingresar</div>
    <div class="card-sub">Accedé con tu email y contraseña.</div>

    <div class="msg" id="msg"></div>

    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">
    </div>
    <button class="btn" id="btn" onclick="login()">Ingresar</button>
  </div>

  <div class="footer-note">
    ¿No tenés cuenta? Necesitás un<br>link de invitación del administrador.
  </div>
</div>

<script>
/* ── CONFIGURACIÓN ── cambiá esta URL por la de tu API ── */
const API = 'http://200.58.127.105/qa.neofan/index.php/Dashboard_test';

/* Si ya hay sesión, ir directo al dashboard */
if (localStorage.getItem('tol_email')) {
  location.href = 'dashboard.html';
}

function showMsg(txt) {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg error';
  el.style.display = 'block';
}

async function login() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn');

  document.getElementById('msg').style.display = 'none';
  document.querySelectorAll('input').forEach(i => i.classList.remove('err'));

  if (!email)    { document.getElementById('email').classList.add('err'); return; }
  if (!password) { document.getElementById('password').classList.add('err'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Ingresando…';

  try {
    
    const res  = await fetch(`${API}/auth/login`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password })
    });

    console.log("AWDAW", res);
    
    
    const data = await res.json();

    

    if (!res.ok || !data.ok) {
      showMsg(data.message || 'Email o contraseña incorrectos.');
      btn.disabled = false;
      btn.textContent = 'Ingresar';
      return;
    }

    /* Guardar sesión mínima y redirigir */
    localStorage.setItem('tol_email', data.email);
    location.href = 'dashboard.html';

  } catch (e) {
    showMsg('No se pudo conectar con el servidor.');
    btn.disabled = false;
    btn.textContent = 'Ingresar';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>
</body>
</html>
