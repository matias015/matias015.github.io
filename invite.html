<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOL — Activar cuenta</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500&family=IBM+Plex+Mono&display=swap');
:root {
  --bg:#0b0d12; --surf:#111318; --card:#161b24;
  --b1:rgba(255,255,255,0.07); --b2:rgba(255,255,255,0.14);
  --txt:#dde1ea; --muted:#636878;
  --acc:#4f8ef7; --grn:#2dd4bf; --red:#f43f5e;
  --font:'IBM Plex Sans',sans-serif;
  --r:10px;
}
*, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
body { font-family:var(--font); background:var(--bg); color:var(--txt); min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.wrap { width:100%; max-width:420px; }
.logo-row { display:flex; align-items:center; gap:10px; margin-bottom:32px; justify-content:center; }
.logo { width:36px; height:36px; background:var(--acc); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:17px; font-weight:600; color:#fff; }
.brand { font-size:16px; font-weight:500; }
.card { background:var(--card); border:1px solid var(--b1); border-radius:14px; padding:32px; }
.card-title { font-size:20px; font-weight:300; margin-bottom:6px; }
.card-sub { font-size:13px; color:var(--muted); margin-bottom:28px; line-height:1.6; }
.field { margin-bottom:18px; }
.field label { display:block; font-size:11px; font-weight:500; text-transform:uppercase; letter-spacing:.07em; color:var(--muted); margin-bottom:7px; }
.field input { width:100%; background:var(--surf); border:1px solid var(--b2); border-radius:var(--r); padding:11px 14px; color:var(--txt); font-family:var(--font); font-size:14px; outline:none; transition:border-color .2s; }
.field input:focus { border-color:var(--acc); }
.field input:disabled { opacity:.5; cursor:not-allowed; }
.field input.err { border-color:var(--red); }
.strength { height:3px; background:rgba(255,255,255,.07); border-radius:2px; margin-top:7px; }
.strength-bar { height:3px; border-radius:2px; transition:width .3s,background .3s; width:0; }
.hint { font-size:11px; color:var(--muted); margin-top:5px; min-height:16px; }
.btn { width:100%; background:var(--acc); border:none; border-radius:var(--r); padding:13px; color:#fff; font-family:var(--font); font-size:14px; font-weight:500; cursor:pointer; transition:opacity .2s; margin-top:8px; }
.btn:hover { opacity:.88; }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.msg { padding:12px 16px; border-radius:var(--r); font-size:13px; margin-bottom:18px; display:none; line-height:1.5; }
.msg.error { background:rgba(244,63,94,.1); border:1px solid rgba(244,63,94,.25); color:#fb7185; }
.msg.ok { background:rgba(45,212,191,.08); border:1px solid rgba(45,212,191,.2); color:#5eead4; }

/* Estados de la pantalla */
#screen-checking, #screen-invalid, #screen-form, #screen-success { display:none; }
#screen-checking { display:flex; align-items:center; gap:10px; color:var(--muted); font-size:13px; }
.spinner { width:18px; height:18px; border:2px solid rgba(255,255,255,.1); border-top-color:var(--acc); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }
@keyframes spin { to { transform:rotate(360deg); } }

/* Pantalla inválida */
.big-icon { font-size:44px; margin-bottom:14px; }
.invalid-title { font-size:18px; font-weight:400; margin-bottom:8px; }
.invalid-sub { font-size:13px; color:var(--muted); line-height:1.6; }

/* Pantalla éxito */
.success-icon { font-size:44px; margin-bottom:14px; }
.success-title { font-size:20px; font-weight:300; margin-bottom:10px; }
.success-sub { font-size:13px; color:var(--muted); line-height:1.7; margin-bottom:24px; }
.go-btn { display:inline-block; background:var(--acc); color:#fff; text-decoration:none; border-radius:var(--r); padding:12px 28px; font-size:14px; font-weight:500; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-row">
    <div class="logo">T</div>
    <span class="brand">TOL Slots Dashboard</span>
  </div>

  <div class="card">

    <!-- Validando token -->
    <div id="screen-checking">
      <div class="spinner"></div>
      Validando invitación…
    </div>

    <!-- Token inválido -->
    <div id="screen-invalid">
      <div class="big-icon">🔒</div>
      <div class="invalid-title">Link inválido</div>
      <div class="invalid-sub" id="invalid-msg">Este link de invitación no es válido o ya fue utilizado.</div>
    </div>

    <!-- Formulario -->
    <div id="screen-form">
      <div class="card-title">Activar cuenta</div>
      <div class="card-sub">Ingresá tu email y creá una contraseña para acceder al dashboard.</div>

      <div class="msg" id="msg"></div>

      <div class="field">
        <label>Email</label>
        <input type="email" id="email" placeholder="tu@email.com" autocomplete="email">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <input type="password" id="password" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
        <div class="strength"><div class="strength-bar" id="str-bar"></div></div>
        <div class="hint" id="str-hint"></div>
      </div>
      <div class="field">
        <label>Confirmar contraseña</label>
        <input type="password" id="password2" placeholder="Repetí la contraseña" autocomplete="new-password">
      </div>
      <button class="btn" id="reg-btn" onclick="register()">Crear cuenta</button>
    </div>

    <!-- Éxito -->
    <div id="screen-success" style="text-align:center;padding:8px 0">
      <div class="success-icon">✓</div>
      <div class="success-title">¡Cuenta creada!</div>
      <div class="success-sub">Tu cuenta fue activada correctamente.<br>Ya podés ingresar al dashboard.</div>
      <a href="index.html" class="go-btn">Ir al login</a>
    </div>

  </div>
</div>

<script>
/* ── CONFIGURACIÓN ── cambiá esta URL por la de tu API ── */
const API = 'http://200.58.127.105/qa.neofan/index.php/Dashboard_test/';

const token = new URLSearchParams(location.search).get('token') || '';

function show(id) {
  ['screen-checking','screen-invalid','screen-form','screen-success']
    .forEach(s => document.getElementById(s).style.display = s === id ? (id === 'screen-checking' ? 'flex' : 'block') : 'none');
}

function showMsg(txt, type = 'error') {
  const el = document.getElementById('msg');
  el.textContent = txt;
  el.className = 'msg ' + type;
  el.style.display = 'block';
}

/* ── Validar token al cargar ── */
async function validateToken() {
  if (!token) {
    document.getElementById('invalid-msg').textContent = 'No se encontró un token de invitación en el link.';
    show('screen-invalid');
    return;
  }
  try {
    const res  = await fetch(`${API}/auth/validate-invite/${token}`);
    const data = await res.json();

    if (!res.ok) {
      document.getElementById('invalid-msg').textContent = data.message || 'Token inválido o expirado.';
      show('screen-invalid');
      return;
    }

    /* Si el token tiene email fijo, prellenarlo y bloquearlo */
    if (data.email) {
      const inp = document.getElementById('email');
      inp.value    = data.email;
      inp.disabled = true;
    }
    show('screen-form');

  } catch (e) {
    document.getElementById('invalid-msg').textContent = 'No se pudo conectar con el servidor. Intentá más tarde.';
    show('screen-invalid');
  }
}

/* ── Medidor de fortaleza ── */
document.getElementById('password').addEventListener('input', function () {
  const v = this.value;
  let score = 0;
  if (v.length >= 8)           score++;
  if (v.length >= 12)          score++;
  if (/[A-Z]/.test(v))         score++;
  if (/[0-9]/.test(v))         score++;
  if (/[^A-Za-z0-9]/.test(v)) score++;

  const levels = [
    { w: '0%',   bg: 'transparent', t: '' },
    { w: '25%',  bg: '#f43f5e',     t: 'Muy débil' },
    { w: '50%',  bg: '#f59e0b',     t: 'Débil' },
    { w: '75%',  bg: '#4f8ef7',     t: 'Buena' },
    { w: '90%',  bg: '#2dd4bf',     t: 'Fuerte' },
    { w: '100%', bg: '#2dd4bf',     t: 'Muy fuerte' },
  ];
  const l = levels[Math.min(score, 5)];
  document.getElementById('str-bar').style.cssText = `width:${l.w};background:${l.bg}`;
  document.getElementById('str-hint').textContent  = l.t;
});

/* ── Registrar ── */
async function register() {
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('password').value;
  const pwd2  = document.getElementById('password2').value;
  const btn   = document.getElementById('reg-btn');

  document.getElementById('msg').style.display = 'none';
  document.querySelectorAll('input').forEach(i => i.classList.remove('err'));

  if (!email) {
    showMsg('Ingresá tu email.');
    document.getElementById('email').classList.add('err');
    return;
  }
  if (pwd.length < 8) {
    showMsg('La contraseña debe tener al menos 8 caracteres.');
    document.getElementById('password').classList.add('err');
    return;
  }
  if (pwd !== pwd2) {
    showMsg('Las contraseñas no coinciden.');
    document.getElementById('password2').classList.add('err');
    return;
  }

  btn.disabled    = true;
  btn.textContent = 'Creando cuenta…';

  try {
    const res  = await fetch(`${API}/auth/register`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ token, email, password: pwd })
    });
    const data = await res.json();

    if (!res.ok) {
      showMsg(data.message || 'Error al crear la cuenta.');
      btn.disabled    = false;
      btn.textContent = 'Crear cuenta';
      return;
    }

    show('screen-success');

  } catch (e) {
    showMsg('Error de conexión. Intentá de nuevo.');
    btn.disabled    = false;
    btn.textContent = 'Crear cuenta';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });

validateToken();
</script>
</body>
</html>
